services:
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    env_file:
      - ../../backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ../../frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://food.trungdevops.vn}
    restart: unless-stopped
    depends_on:
      - backend

  admin:
    build:
      context: ../../admin
      args:
        VITE_API_URL: ${VITE_API_URL:-http://food.trungdevops.vn}
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - admin
      - backend
    restart: unless-stopped

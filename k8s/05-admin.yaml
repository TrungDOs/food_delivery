apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: food-delivery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      containers:
        - name: admin
          image: trungdevops/food-delivery-admin:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: food-delivery
spec:
  selector:
    app: admin
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
